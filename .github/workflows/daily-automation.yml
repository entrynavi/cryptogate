name: Daily SEO & Content Automation

on:
  schedule:
    # 毎日朝9時(JST)に実行 = UTC 0:00
    - cron: '0 0 * * *'
    # 夕方18時(JST) = UTC 9:00 にSNSコンテンツ更新
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Update Dates & Campaign Countdowns
        run: python3 scripts/update_dates.py

      - name: Update Sitemap lastmod
        run: python3 scripts/update_sitemap.py

      - name: Generate SNS Content
        run: python3 scripts/generate_social.py

      - name: Ping Search Engines
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://entrynavi.github.io/web3-navi/sitemap.xml" || true
          curl -s "https://www.bing.com/ping?sitemap=https://entrynavi.github.io/web3-navi/sitemap.xml" || true

      - name: Submit to IndexNow
        run: python3 scripts/submit_indexnow.py || true

      - name: Post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python3 scripts/post_bluesky.py || true

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Daily auto-update: $(date +%Y-%m-%d)

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push
          fi
