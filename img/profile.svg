<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="diamond" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.5"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#3b82f6" stroke-width="0.5">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="200" r="110" fill="none" stroke="url(#glow)" stroke-width="1.5" opacity="0.5"/>

  <!-- Diamond icon -->
  <g filter="shadow">
    <path d="M256 100 L356 200 L256 300 L156 200 Z" fill="none" stroke="url(#diamond)" stroke-width="6" stroke-linejoin="round"/>
  </g>

  <!-- Inner diamond facets -->
  <path d="M256 100 L256 300" stroke="url(#diamond)" stroke-width="1.5" opacity="0.3"/>
  <path d="M156 200 L356 200" stroke="url(#diamond)" stroke-width="1.5" opacity="0.3"/>

  <!-- Center gem -->
  <circle cx="256" cy="200" r="20" fill="url(#diamond)" filter="innerGlow"/>
  <circle cx="256" cy="200" r="8" fill="white" opacity="0.8"/>

  <!-- Text: CryptoGate -->
  <text x="256" y="370" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="2">CryptoGate</text>

  <!-- Subtitle -->
  <text x="256" y="405" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="20" fill="#94a3b8" letter-spacing="4">クリプトゲート</text>

  <!-- Tagline -->
  <text x="256" y="445" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="16" fill="#64748b" letter-spacing="1">仮想通貨の入口がここにある</text>
</svg>