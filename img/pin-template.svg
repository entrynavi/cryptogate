  <text x="500" y="1335" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="700" fill="white">詳しくはプロフリンクから →</text>

  <!-- Footer -->
  <text x="500" y="1440" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#475569">entrynavi.github.io/web3-navi</text>
