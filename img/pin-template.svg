  </defs>

  <!-- Background -->
  <rect width="1000" height="1500" rx="24" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1000" height="6" rx="3" fill="url(#accent)"/>

  <!-- Header area -->
  <g transform="translate(500, 140)">
    <path d="M0 -50 L50 0 L0 50 L-50 0 Z" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="12" fill="url(#accent)"/>
    <circle cx="0" cy="0" r="5" fill="white" opacity="0.8"/>
  </g>
  <text x="500" y="230" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="28" fill="#94a3b8" letter-spacing="4">CryptoGate</text>

  <!-- Main title area -->
  <text x="500" y="360" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="56" font-weight="700" fill="white">【2026年最新】</text>
  <text x="500" y="440" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="white">仮想通貨取引所</text>
  <text x="500" y="520" text-anchor="middle" font-family="'SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="700" fill="white">おすすめランキング</text>

  <!-- Divider -->
  <rect x="400" y="570" width="200" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Feature cards -->
  <g transform="translate(80, 630)">
    <rect width="840" height="100" rx="16" fill="url(#card)" stroke="#1e293b" stroke-width="1"/>
    <text x="30" y="40" font-size="22" fill="#f0b90b">🥇</text>
    <text x="70" y="42" font-family="Arial,sans-serif" font-size="28" font-weight="600" fill="white">MEXC</text>
    <text x="70" y="75" font-family="Arial,sans-serif" font-size="18" fill="#94a3b8">手数料0% ・ 2,700通貨 ・ 最大200倍</text>
  </g>

  <g transform="translate(80, 750)">
    <rect width="840" height="100" rx="16" fill="url(#card)" stroke="#1e293b" stroke-width="1"/>
    <text x="30" y="40" font-size="22" fill="#c0c0c0">🥈</text>
    <text x="70" y="42" font-family="Arial,sans-serif" font-size="28" font-weight="600" fill="white">Bitget</text>
    <text x="70" y="75" font-family="Arial,sans-serif" font-size="18" fill="#94a3b8">コピトレNo.1 ・ 800通貨 ・ 最大125倍</text>
  </g>

  <g transform="translate(80, 870)">
    <rect width="840" height="100" rx="16" fill="url(#card)" stroke="#1e293b" stroke-width="1"/>
    <text x="30" y="40" font-size="22" fill="#cd7f32">🥉</text>
    <text x="70" y="42" font-family="Arial,sans-serif" font-size="28" font-weight="600" fill="white">Coincheck</text>
    <text x="70" y="75" font-family="Arial,sans-serif" font-size="18" fill="#94a3b8">金融庁登録 ・ 初心者No.1 ・ 500円〜</text>
  </g>

  <g transform="translate(80, 990)">
    <rect width="840" height="100" rx="16" fill="url(#card)" stroke="#1e293b" stroke-width="1"/>
    <text x="40" y="42" font-family="Arial,sans-serif" font-size="22" fill="#64748b">4.</text>
    <text x="70" y="42" font-family="Arial,sans-serif" font-size="28" font-weight="600" fill="white">Binance Japan</text>
    <text x="70" y="75" font-family="Arial,sans-serif" font-size="18" fill="#94a3b8">世界最大 ・ 金融庁登録 ・ 高セキュリティ</text>
  </g>

  <g transform="translate(80, 1110)">
    <rect width="840" height="100" rx="16" fill="url(#card)" stroke="#1e293b" stroke-width="1"/>
    <text x="40" y="42" font-family="Arial,sans-serif" font-size="22" fill="#64748b">5.</text>
    <text x="70" y="42" font-family="Arial,sans-serif" font-size="28" font-weight="600" fill="white">Hyperliquid</text>
    <text x="70" y="75" font-family="Arial,sans-serif" font-size="18" fill="#94a3b8">次世代DEX ・ ガス代0 ・ エアドロ期待</text>
  </g>

  <!-- CTA -->
